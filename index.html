<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chicago — Programa</title>
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNyIgZmlsbD0iI2E1MWMyNCIvPjxwYXRoIGQ9Ik0xNiw1TDE4LjYsMTIuNEwyNi41LDEyLjZMMjAuMiwxNy40TDIyLjUsMjQuOUwxNiwyMC40TDkuNSwyNC45TDExLjgsMTcuNEw1LjUsMTIuNkwxMy40LDEyLjRaIiBmaWxsPSIjZmZmZmZmIi8+PC9zdmc+">
<style>
  :root{
    --blur: 20px;         /* intensidade do desfoque do fundo */
    --bg-zoom: 1.16;      /* zoom do fundo: esconde bordas do blur e dá folga p/ o parallax */
    --frame-h: 94svh;     /* altura do quadro no desktop */
    --red: #a51c24;       /* vermelho da marca (pôster CHICAGO) */
    --serif: "Didot","Bodoni MT","Playfair Display",Georgia,"Times New Roman",serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; background:#0a0a0b; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }

  /* Trilho HORIZONTAL — vira página deslizando para os lados (flip) */
  .deck{
    display:flex;
    height:100svh; width:100vw;
    overflow-x:scroll; overflow-y:hidden;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .deck::-webkit-scrollbar{ display:none; }

  .slide{
    flex:0 0 100vw;
    height:100svh;
    scroll-snap-align:center; scroll-snap-stop:always;
    display:flex; align-items:center; justify-content:center;
  }

  /* Quadro 9:16 */
  .stage{
    position:relative;
    aspect-ratio:9 / 16;
    height:var(--frame-h);
    max-height:100svh;
    max-width:100vw;
    overflow:hidden;
    background:#000;
    border-radius:14px;
    box-shadow:0 22px 60px rgba(0,0,0,.55);      /* eleva o "card" no desktop */
  }
  @media (max-aspect-ratio:9/16){                /* celular em pé: ocupa a tela toda */
    .stage{ height:100svh; width:100vw; border-radius:0; box-shadow:none; }
  }

  /* Fundo: mesma imagem, coberta, desfocada e ampliada (recebe o parallax) */
  .stage .bg{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover;
    transform:scale(var(--bg-zoom));
    filter:blur(var(--blur)) saturate(1.15) brightness(.82);
    will-change:transform;
  }
  /* Frente: mesma imagem, inteira, nítida (aparece com fade ao carregar) */
  .stage .fg{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:contain;
    filter:drop-shadow(0 12px 40px rgba(0,0,0,.55));
    opacity:0; transition:opacity .55s ease;
  }
  .stage .fg.loaded{ opacity:1; }

  /* Contador de páginas */
  .counter{
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    z-index:5; padding:6px 15px; border-radius:999px;
    background:rgba(0,0,0,.45); backdrop-filter:blur(8px);
    font-size:12px; letter-spacing:2px; font-variant-numeric:tabular-nums;
    pointer-events:none; opacity:.9; transition:opacity .6s ease;
  }
  .counter b{ color:var(--red); font-weight:700; }
  .counter span{ opacity:.7; }
  .counter.off{ opacity:0; }                     /* some na página final */

  /* Barra de progresso */
  .progress{
    position:fixed; left:0; bottom:0; width:100%; height:3px; z-index:5;
    background:rgba(255,255,255,.08); transition:opacity .6s ease;
  }
  .progress__fill{
    height:100%; width:0;
    background:var(--red); box-shadow:0 0 10px rgba(165,28,36,.7);
    transition:width .1s linear;
  }

  /* Indicador animado "arraste" — só na 1ª página */
  .swipe-hint{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:6; display:flex; align-items:center; gap:9px;
    padding:9px 16px 9px 18px; border-radius:999px;
    background:rgba(0,0,0,.5); backdrop-filter:blur(8px);
    font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:#fff;
    pointer-events:none; transition:opacity .5s ease;
    animation:hint-pulse 2.6s ease-in-out infinite;
  }
  .swipe-hint.hidden{ opacity:0; }
  .swipe-hint .arrow{ display:inline-flex; color:#fff;
    animation:swipe 1.5s cubic-bezier(.45,0,.25,1) infinite; }

  @keyframes swipe{
    0%   { transform:translateX(-7px); opacity:.35; }
    45%  { transform:translateX(7px);  opacity:1;   }
    70%  { transform:translateX(7px);  opacity:1;   }
    100% { transform:translateX(-7px); opacity:.35; }
  }
  @keyframes hint-pulse{
    0%,100% { box-shadow:0 0 0 0 rgba(255,255,255,0); }
    50%     { box-shadow:0 0 0 4px rgba(255,255,255,.06); }
  }

  /* Durante a intro, a UI fica oculta */
  body.booting .counter,
  body.booting .swipe-hint,
  body.booting .progress{ opacity:0 !important; }

  /* ===== Camadas compartilhadas (intro + página 1) ===== */
  .page-box{
    position:absolute; left:0; width:100%;
    top:50%; transform:translateY(-50%);
    aspect-ratio:1750 / 2480;                    /* proporção exata da página (A4) */
  }
  .page-box .base   { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .page-box .chicago{ position:absolute; left:2.5%; top:5%;    width:95%; }
  .page-box .tmpc   { position:absolute; left:39.5%; bottom:2.5%; width:21%; }

  /* ===== Intro: montagem das 3 camadas ===== */
  .intro{
    position:fixed; inset:0; z-index:20;
    display:flex; align-items:center; justify-content:center;
    background:#000;
    animation:intro-out .7s ease forwards 3.2s;   /* cross-fade p/ a página real */
  }
  .intro .bg     { animation:intro-base 1.1s cubic-bezier(.16,1,.3,1) both; }
  .intro .base   { animation:intro-base 1.1s cubic-bezier(.16,1,.3,1) both; }
  .intro .chicago{ animation:intro-chicago 1.1s cubic-bezier(.16,1,.3,1) both .7s; }
  .intro .tmpc   { animation:intro-tmpc .9s ease-out both 1.7s; }

  @keyframes intro-base{
    from{ opacity:0; transform:scale(1.08); }
    to  { opacity:1; transform:scale(1); }
  }
  @keyframes intro-chicago{
    from{ opacity:0; transform:translateY(-40px) scale(.92); }
    to  { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes intro-tmpc{
    from{ opacity:0; transform:translateY(18px); }
    to  { opacity:1; transform:translateY(0); }
  }
  @keyframes intro-out{ to{ opacity:0; visibility:hidden; } }

  /* ===== Página 1: mesma composição, agora com vida (idle sutil) ===== */
  .p1 .base   { animation:p1-base 18s ease-in-out infinite; }        /* palco respira */
  .p1 .chicago{ animation:p1-chicago 6s ease-in-out infinite; }      /* luz no título */
  .p1 .tmpc   { animation:p1-tmpc 5s ease-in-out infinite; }         /* selo brilha */

  @keyframes p1-base{
    0%,100%{ transform:scale(1.0)  translateY(0); }
    50%    { transform:scale(1.09) translateY(-1.5%); }
  }
  @keyframes p1-chicago{
    0%,100%{ filter:brightness(1)    drop-shadow(0 0 0 rgba(210,50,45,0));   transform:translateY(0) scale(1); }
    50%    { filter:brightness(1.28) drop-shadow(0 0 16px rgba(210,50,45,.5)); transform:translateY(-1.6%) scale(1.02); }
  }
  @keyframes p1-tmpc{
    0%,100%{ opacity:.82; filter:drop-shadow(0 0 0 rgba(255,255,255,0));  transform:scale(1); }
    50%    { opacity:1;   filter:drop-shadow(0 0 14px rgba(255,255,255,.45)); transform:scale(1.03); }
  }

  /* ===== Última página: agradecimento + Instagram ===== */
  .outro .bg{
    filter:blur(26px) saturate(1.1) brightness(.62);            /* desfoque + escurece */
    animation:outro-drift 22s ease-in-out infinite alternate;   /* idle: palco respirando */
  }
  .outro-scrim{
    position:absolute; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(120% 95% at 50% 42%, rgba(0,0,0,.10), rgba(0,0,0,.72) 80%);
  }
  .outro-content{
    position:absolute; inset:0; z-index:2;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:10% 12%; text-align:center;
  }
  .tmpc-link{
    position:relative; display:block; width:min(48%,230px);
    filter:drop-shadow(0 6px 22px rgba(0,0,0,.55));
    animation:outro-float 4.2s ease-in-out infinite;
    transition:transform .3s ease, filter .3s ease;
  }
  .tmpc-link::before{                                           /* refletor atrás do logo */
    content:""; position:absolute; z-index:-1;
    left:50%; top:50%; width:250%; aspect-ratio:1; transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(255,255,255,.40), rgba(255,255,255,0) 62%);
    filter:blur(10px); pointer-events:none;
    animation:outro-spot 5s ease-in-out infinite;
  }
  .tmpc-link img{ width:100%; display:block; }
  .tmpc-link:hover{ transform:scale(1.06); filter:drop-shadow(0 8px 30px rgba(255,255,255,.30)); }

  /* Separador art déco */
  .deco-rule{ display:flex; align-items:center; gap:12px; width:min(58%,210px); }
  .deco-rule::before,.deco-rule::after{ content:""; height:1px; flex:1; }
  .deco-rule::before{ background:linear-gradient(90deg, transparent, rgba(255,255,255,.55)); }
  .deco-rule::after { background:linear-gradient(90deg, rgba(255,255,255,.55), transparent); }
  .deco-rule i{ width:7px; height:7px; background:var(--red); transform:rotate(45deg);
    box-shadow:0 0 10px rgba(165,28,36,.85); }

  .outro-content h2{ font-family:var(--serif); font-weight:600;
    font-size:clamp(23px,6vw,34px); letter-spacing:.5px; }
  .outro-content p{ font-size:clamp(13px,3.5vw,16px); opacity:.85; max-width:24ch; line-height:1.5; }
  .outro-content .handle{
    display:inline-flex; align-items:center; gap:8px;
    padding:9px 18px; border:1px solid rgba(255,255,255,.35); border-radius:999px;
    color:#fff; text-decoration:none;
    font-size:clamp(12px,3.2vw,14px); letter-spacing:1px;
    transition:border-color .25s ease, background .25s ease, transform .25s ease;
  }
  .outro-content .handle svg{ width:17px; height:17px; }
  .outro-content .handle:hover{ border-color:var(--red);
    background:rgba(165,28,36,.20); transform:translateY(-1px); }

  @keyframes outro-drift{
    from{ transform:scale(1.04); }
    to  { transform:scale(1.16) translateY(-3%); }
  }
  @keyframes outro-spot{
    0%,100%{ opacity:.35; transform:translate(-50%,-50%) scale(.82); }
    50%    { opacity:1;   transform:translate(-50%,-50%) scale(1.22); }
  }
  @keyframes outro-float{
    0%,100%{ transform:translateY(0); }
    50%    { transform:translateY(-16px); }
  }

  @media (prefers-reduced-motion:reduce){
    .swipe-hint,.swipe-hint .arrow{ animation:none; }
    .intro,.intro *{ animation:none !important; }
    .p1 .base,.p1 .chicago,.p1 .tmpc{ animation:none !important; }
    .outro .bg,.tmpc-link,.tmpc-link::before{ animation:none !important; }
  }
</style>
</head>
<body class="booting">
  <!-- Intro: as 3 camadas se montando sobre o quadro 9:16 -->
  <div class="intro" id="intro" aria-hidden="true">
    <div class="stage">
      <img class="bg" src="assets/base.jpeg" alt="">
      <div class="page-box">
        <img class="base" src="assets/base.jpeg" alt="">
        <img class="chicago" src="assets/logoChicago.png" alt="CHICAGO — O Musical">
        <img class="tmpc" src="assets/logoTMPC.png" alt="TMPC — Teatro Musical Poços de Caldas">
      </div>
    </div>
  </div>

  <div class="counter" id="counter"><b>1</b> <span>/ 32</span></div>

  <div class="swipe-hint" id="swipeHint">
    <span>arraste</span>
    <span class="arrow" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12h13M12 6l6 6-6 6"/>
      </svg>
    </span>
  </div>

  <div class="progress" id="progress"><div class="progress__fill" id="progressFill"></div></div>

  <div class="deck" id="deck"></div>

<script>
  const TOTAL = 32;
  const name  = i => `assets/pagina_${String(i).padStart(2,'0')}.jpg`;
  const deck  = document.getElementById('deck');
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;

  // --- Página 1: composição em camadas com idle sutil ---
  const p1 = document.createElement('div');
  p1.className = 'slide'; p1.dataset.page = '1';
  p1.innerHTML =
    `<div class="stage">
       <img class="bg" src="assets/base.jpeg" alt="" aria-hidden="true">
       <div class="page-box p1">
         <img class="base" src="assets/base.jpeg" alt="Chicago — O Musical · TMPC">
         <img class="chicago" src="assets/logoChicago.png" alt="" aria-hidden="true">
         <img class="tmpc" src="assets/logoTMPC.png" alt="" aria-hidden="true">
       </div>
     </div>`;
  deck.appendChild(p1);

  // --- Páginas 2..32: imagem única (fundo desfocado recebe parallax) ---
  const frag = document.createDocumentFragment();
  for(let i=2;i<=TOTAL;i++){
    const src = name(i);
    const slide = document.createElement('div');
    slide.className='slide'; slide.dataset.page=i;
    slide.innerHTML =
      `<div class="stage">
         <img class="bg px" src="${src}" alt="" aria-hidden="true" loading="lazy">
         <img class="fg" src="${src}" alt="Página ${i}" loading="lazy">
       </div>`;
    frag.appendChild(slide);
  }
  deck.appendChild(frag);

  // --- Última página: agradecimento + Instagram ---
  const IGURL = "https://www.instagram.com/teatromusicalpc/";
  const IG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/>
      <circle cx="17.3" cy="6.7" r="1.1" fill="currentColor" stroke="none"/></svg>`;
  const end = document.createElement('div');
  end.className='slide'; end.dataset.page='fim';
  end.innerHTML =
    `<div class="stage outro">
       <img class="bg" src="assets/base.jpeg" alt="" aria-hidden="true">
       <div class="outro-scrim"></div>
       <div class="outro-content">
         <a class="tmpc-link" href="${IGURL}" target="_blank" rel="noopener">
           <img src="assets/logoTMPC.png" alt="Seguir @teatromusicalpc no Instagram">
         </a>
         <div class="deco-rule"><i></i></div>
         <h2>Obrigado por nos assistir!</h2>
         <p>Clique no logo para seguir nosso Instagram</p>
         <a class="handle" href="${IGURL}" target="_blank" rel="noopener">${IG}@teatromusicalpc</a>
       </div>
     </div>`;
  deck.appendChild(end);

  // Fade-in das páginas ao decodificar
  deck.querySelectorAll('img.fg').forEach(img=>{
    if(img.complete) img.classList.add('loaded');
    else img.addEventListener('load', ()=>img.classList.add('loaded'), {once:true});
  });

  // --- Contador, dica e pré-carregamento das vizinhas ---
  const counter = document.getElementById('counter');
  const hint = document.getElementById('swipeHint');
  const preload = idx => [idx-1, idx+1].forEach(n=>{
    const im = deck.querySelector(`.slide[data-page="${n}"] img.fg`);
    if(im) im.loading = 'eager';
  });
  const io = new IntersectionObserver(es=>{
    es.forEach(e=>{
      if(e.isIntersecting && e.intersectionRatio>0.5){
        const p = e.target.dataset.page;
        const isEnd = p === 'fim';
        counter.classList.toggle('off', isEnd);
        if(!isEnd){ counter.innerHTML = `<b>${p}</b> <span>/ ${TOTAL}</span>`; preload(+p); }
        hint.classList.toggle('hidden', p !== '1');
      }
    });
  },{root:deck, threshold:[0.5,0.6]});
  deck.querySelectorAll('.slide').forEach(s=>io.observe(s));

  // --- Barra de progresso + parallax do fundo (rAF-throttled) ---
  const fill = document.getElementById('progressFill');
  let ticking = false;
  function frame(){
    const max = deck.scrollWidth - deck.clientWidth;
    fill.style.width = (max>0 ? deck.scrollLeft/max*100 : 0) + '%';
    if(!reduce){
      const cx = window.innerWidth/2;
      deck.querySelectorAll('.slide').forEach(slide=>{
        const bg = slide.querySelector('.px'); if(!bg) return;
        const r = slide.getBoundingClientRect();
        const dx = (r.left + r.width/2) - cx;              // deslocamento do centro
        if(Math.abs(dx) > r.width*1.6){ bg.style.transform=''; return; }
        bg.style.transform = `translateX(${(-dx*0.12).toFixed(1)}px) scale(var(--bg-zoom))`;
      });
    }
    ticking = false;
  }
  deck.addEventListener('scroll', ()=>{ if(!ticking){ ticking=true; requestAnimationFrame(frame); } }, {passive:true});
  addEventListener('resize', ()=>requestAnimationFrame(frame));
  frame();

  // --- Navegação: teclado (todos) + clique nas laterais (desktop) ---
  const flip = dir => deck.scrollBy({left: dir*deck.clientWidth, behavior:'smooth'});
  addEventListener('keydown', ev=>{
    if(['ArrowRight','ArrowDown',' ','PageDown'].includes(ev.key)){ ev.preventDefault(); flip(1); }
    else if(['ArrowLeft','ArrowUp','PageUp'].includes(ev.key)){ ev.preventDefault(); flip(-1); }
  });
  if(matchMedia('(hover:hover) and (pointer:fine)').matches){
    deck.addEventListener('click', ev=>{
      if(ev.target.closest('a')) return;                  // não interfere no logo/Instagram
      const x = ev.clientX, w = window.innerWidth;
      if(x > w*0.62) flip(1);
      else if(x < w*0.38) flip(-1);
    });
  }

  // --- Encerra a intro: revela a UI e a página 1 (já viva) ---
  const intro = document.getElementById('intro');
  const endIntro = () => {
    if(intro) intro.remove();
    document.body.classList.remove('booting');
  };
  setTimeout(endIntro, reduce ? 200 : 3950);   // animação de entrada ~3,9s (< 4s)
</script>
</body>
</html>
