<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chicago — Programa</title>
<style>
  :root{
    --blur: 20px;        /* intensidade do desfoque do fundo */
    --bg-zoom: 1;      /* zoom do fundo p/ esconder bordas do blur */
    --frame-h: 94svh;     /* altura do quadro no desktop */
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; background:#0a0a0b; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }

  /* Trilho HORIZONTAL — vira página deslizando para os lados (flip) */
  .deck{
    display:flex;
    height:100svh; width:100vw;
    overflow-x:scroll; overflow-y:hidden;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .deck::-webkit-scrollbar{ display:none; }

  .slide{
    flex:0 0 100vw;
    height:100svh;
    scroll-snap-align:center; scroll-snap-stop:always;
    display:flex; align-items:center; justify-content:center;
  }

  /* Quadro 9:16 */
  .stage{
    position:relative;
    aspect-ratio:9 / 16;
    height:var(--frame-h);
    max-height:100svh;
    max-width:100vw;
    overflow:hidden;
    background:#000;
    border-radius:14px;
  }
  @media (max-aspect-ratio:9/16){        /* celular em pé: ocupa a tela toda */
    .stage{ height:100svh; width:100vw; border-radius:0; }
  }

  /* Fundo: mesma imagem, coberta, desfocada e ampliada */
  .stage .bg{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover;
    transform:scale(var(--bg-zoom));
    filter:blur(var(--blur)) saturate(1.15) brightness(.82);
    will-change:transform;
  }
  /* Frente: mesma imagem, inteira, nítida */
  .stage .fg{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:contain;
    filter:drop-shadow(0 12px 40px rgba(0,0,0,.55));
  }

  /* Contador de páginas */
  .counter{
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    z-index:5; padding:6px 14px; border-radius:999px;
    background:rgba(0,0,0,.45); backdrop-filter:blur(8px);
    font-size:13px; letter-spacing:.5px; font-variant-numeric:tabular-nums;
    pointer-events:none; opacity:.85; transition:opacity .6s ease;
  }

  /* Indicador animado "arraste" — só na 1ª página */
  .swipe-hint{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
    z-index:6; display:flex; align-items:center; gap:9px;
    padding:9px 16px 9px 18px; border-radius:999px;
    background:rgba(0,0,0,.5); backdrop-filter:blur(8px);
    font-size:13px; letter-spacing:.6px; color:#fff;
    pointer-events:none; transition:opacity .5s ease;
    animation:hint-pulse 2.6s ease-in-out infinite;
  }
  .swipe-hint.hidden{ opacity:0; }
  .swipe-hint .arrow{ display:inline-flex; color:#fff;
    animation:swipe 1.5s cubic-bezier(.45,0,.25,1) infinite; }

  @keyframes swipe{
    0%   { transform:translateX(-7px); opacity:.35; }
    45%  { transform:translateX(7px);  opacity:1;   }
    70%  { transform:translateX(7px);  opacity:1;   }
    100% { transform:translateX(-7px); opacity:.35; }
  }
  @keyframes hint-pulse{
    0%,100% { box-shadow:0 0 0 0 rgba(255,255,255,0); }
    50%     { box-shadow:0 0 0 4px rgba(255,255,255,.06); }
  }
  /* ===== Intro: montagem das 3 camadas (base + CHICAGO + TMPC) ===== */
  body.booting .counter, body.booting .swipe-hint{ opacity:0 !important; }

  .intro{
    position:fixed; inset:0; z-index:20;
    display:flex; align-items:center; justify-content:center;
    background:#000;
    animation:intro-out .7s ease forwards 3.2s;   /* cross-fade p/ a página real */
  }
  .intro .bg{                                     /* fundo desfocado, igual ao deck */
    animation:intro-base 1.1s cubic-bezier(.16,1,.3,1) both;
  }
  /* Caixa com a proporção exata da página (A4) sobre o quadro 9:16 */
  .page-box{
    position:absolute; left:0; width:100%;
    top:50%; transform:translateY(-50%);
    aspect-ratio:1750 / 2480;
  }
  .page-box .base{                                /* camada 1 — foto do palco */
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    animation:intro-base 1.1s cubic-bezier(.16,1,.3,1) both;
  }
  .page-box .chicago{                             /* camada 2 — título, desce do topo */
    position:absolute; left:2.5%; top:5%; width:95%;
    animation:intro-chicago 1.1s cubic-bezier(.16,1,.3,1) both .7s;
  }
  .page-box .tmpc{                                /* camada 3 — selo, surge por baixo */
    position:absolute; left:39.5%; bottom:2.5%; width:21%;
    animation:intro-tmpc .9s ease-out both 1.7s;
  }

  @keyframes intro-base{
    from{ opacity:0; transform:scale(1.08); }     /* luzes "sobem": leve zoom-out */
    to  { opacity:1; transform:scale(1); }
  }
  @keyframes intro-chicago{
    from{ opacity:0; transform:translateY(-40px) scale(.92); }
    to  { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes intro-tmpc{
    from{ opacity:0; transform:translateY(18px); }
    to  { opacity:1; transform:translateY(0); }
  }
  @keyframes intro-out{
    to{ opacity:0; visibility:hidden; }
  }

  /* ===== Última página: agradecimento + Instagram ===== */
  .counter.off{ opacity:0; }               /* contador some nessa página */

  .outro .bg{
    filter:blur(26px) saturate(1.1) brightness(.62);        /* desfoque + escurece p/ ler o texto */
    animation:outro-drift 22s ease-in-out infinite alternate;  /* idle: palco "respirando" */
  }
  .outro-scrim{
    position:absolute; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(120% 95% at 50% 42%, rgba(0,0,0,.10), rgba(0,0,0,.72) 80%);
  }
  .outro-content{
    position:absolute; inset:0; z-index:2;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; padding:10% 12%; text-align:center;
  }
  .tmpc-link{
    position:relative; display:block; width:min(48%,230px);
    filter:drop-shadow(0 6px 22px rgba(0,0,0,.55));
    animation:outro-float 4.2s ease-in-out infinite;        /* idle: flutuar */
    transition:transform .3s ease, filter .3s ease;
  }
  .tmpc-link::before{                                       /* refletor suave atrás do logo */
    content:""; position:absolute; z-index:-1;
    left:50%; top:50%; width:250%; aspect-ratio:1; transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(255,255,255,.40), rgba(255,255,255,0) 62%);
    filter:blur(10px); pointer-events:none;
    animation:outro-spot 5s ease-in-out infinite;           /* idle: refletor pulsando */
  }
  .tmpc-link img{ width:100%; display:block; }
  .tmpc-link:hover{ transform:scale(1.06); filter:drop-shadow(0 8px 30px rgba(255,255,255,.30)); }
  .outro-content h2{ font-size:clamp(21px,5.4vw,32px); font-weight:700; letter-spacing:.3px; }
  .outro-content p{ font-size:clamp(13px,3.5vw,16px); opacity:.85; max-width:24ch; line-height:1.5; }
  .outro-content .handle{ font-size:clamp(12px,3.2vw,15px); letter-spacing:1.5px; opacity:.72; }

  @keyframes outro-drift{
    from{ transform:scale(1.04); }
    to  { transform:scale(1.16) translateY(-3%); }
  }
  @keyframes outro-spot{
    0%,100%{ opacity:.35; transform:translate(-50%,-50%) scale(.82); }
    50%    { opacity:1;   transform:translate(-50%,-50%) scale(1.22); }
  }
  @keyframes outro-float{
    0%,100%{ transform:translateY(0); }
    50%    { transform:translateY(-16px); }
  }

  @media (prefers-reduced-motion:reduce){
    .swipe-hint,.swipe-hint .arrow{ animation:none; }
    .intro, .intro *{ animation:none !important; }
    .outro .bg, .tmpc-link, .tmpc-link::before{ animation:none !important; }
  }
</style>
</head>
<body class="booting">
  <!-- Intro: as 3 camadas se montando sobre o quadro 9:16 -->
  <div class="intro" id="intro" aria-hidden="true">
    <div class="stage">
      <img class="bg" src="base.jpeg" alt="">
      <div class="page-box">
        <img class="base" src="base.jpeg" alt="">
        <img class="chicago" src="logoChicago.png" alt="CHICAGO — O Musical">
        <img class="tmpc" src="logoTMPC.png" alt="TMPC — Teatro Musical Poços de Caldas">
      </div>
    </div>
  </div>

  <div class="counter" id="counter">1 / 32</div>

  <div class="swipe-hint" id="swipeHint">
    <span>arraste</span>
    <span class="arrow" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12h13M12 6l6 6-6 6"/>
      </svg>
    </span>
  </div>

  <div class="deck" id="deck"></div>

<script>
  const TOTAL = 32;                    // nº de páginas
  const name  = i => `pagina_${String(i).padStart(2,'0')}.jpg`;

  const deck = document.getElementById('deck');
  const frag = document.createDocumentFragment();
  for(let i=1;i<=TOTAL;i++){
    const src = name(i);
    const slide = document.createElement('div');
    slide.className='slide'; slide.dataset.page=i;
    slide.innerHTML =
      `<div class="stage">
         <img class="bg" src="${src}" alt="" aria-hidden="true" loading="lazy">
         <img class="fg" src="${src}" alt="Página ${i}" loading="lazy">
       </div>`;
    frag.appendChild(slide);
  }
  deck.appendChild(frag);

  // Última página — agradecimento + Instagram (idle, não bloqueante)
  const end = document.createElement('div');
  end.className = 'slide'; end.dataset.page = 'fim';
  end.innerHTML =
    `<div class="stage outro">
       <img class="bg" src="base.jpeg" alt="" aria-hidden="true">
       <div class="outro-scrim"></div>
       <div class="outro-content">
         <a class="tmpc-link" href="https://www.instagram.com/teatromusicalpc/" target="_blank" rel="noopener">
           <img src="logoTMPC.png" alt="Seguir @teatromusicalpc no Instagram">
         </a>
         <h2>Obrigado por nos assistir!</h2>
         <p>Clique no logo para seguir nosso Instagram</p>
         <span class="handle">@teatromusicalpc</span>
       </div>
     </div>`;
  deck.appendChild(end);

  // Atualiza contador e mostra a dica só na 1ª página
  const counter = document.getElementById('counter');
  const hint = document.getElementById('swipeHint');
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting && e.intersectionRatio>0.5){
        const p = e.target.dataset.page;
        const isEnd = p === 'fim';
        counter.classList.toggle('off', isEnd);
        if(!isEnd) counter.textContent = `${p} / ${TOTAL}`;
        hint.classList.toggle('hidden', p !== '1');
      }
    });
  },{root:deck, threshold:[0.5,0.6]});
  document.querySelectorAll('.slide').forEach(s=>io.observe(s));

  // Setas / espaço no teclado → navegação horizontal (flip)
  addEventListener('keydown',ev=>{
    if(['ArrowRight','ArrowDown',' ','PageDown'].includes(ev.key)){
      ev.preventDefault(); deck.scrollBy({left:deck.clientWidth,behavior:'smooth'});
    }else if(['ArrowLeft','ArrowUp','PageUp'].includes(ev.key)){
      ev.preventDefault(); deck.scrollBy({left:-deck.clientWidth,behavior:'smooth'});
    }
  });

  // Encerra a intro: remove a camada e libera contador/dica/navegação
  const intro = document.getElementById('intro');
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  const endIntro = () => {
    if(intro) intro.remove();
    document.body.classList.remove('booting');
  };
  setTimeout(endIntro, reduce ? 200 : 3950);   // animação total ~3,9s (< 4s)
</script>
</body>
</html>
